<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Inventory Checker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f9ff;
    color:#222;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

header{
    text-align:center;
    padding:30px 10px;
}

header h1{
    color:#007bff;
    font-size:2rem;
}

header p{
    margin-top:10px;
    color:#555;
}

.tool-box{
    background:#fff;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    margin-top:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:12px;
    border:2px solid #dbeafe;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#007bff;
    color:#fff;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056d6;
}

.result{
    margin-top:20px;
    display:none;
}

.card{
    background:#eef6ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.in-stock{
    color:green;
    font-weight:bold;
}

.out-stock{
    color:red;
    font-weight:bold;
}

.history{
    margin-top:20px;
}

.history table{
    width:100%;
    border-collapse:collapse;
}

.history th,
.history td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}

.history th{
    background:#007bff;
    color:#fff;
}

.alert-box{
    margin-top:15px;
    padding:12px;
    border-radius:8px;
    display:none;
}

.alert-success{
    background:#d4edda;
    color:#155724;
}

.alert-danger{
    background:#f8d7da;
    color:#721c24;
}

@media(max-width:768px){
    header h1{
        font-size:1.5rem;
    }

    .tool-box{
        padding:15px;
    }
}
</style>
</head>
<body>

<div class="container">

<header>
    <h1>Amazon Inventory Checker</h1>
    <p>Track stock availability across Amazon US, UK, CA & DE marketplaces.</p>
</header>

<div class="tool-box">

    <div class="form-group">
        <label>Amazon ASIN</label>
        <input type="text" id="asin" placeholder="Enter ASIN">
    </div>

    <div class="form-group">
        <label>Marketplace</label>
        <select id="marketplace">
            <option value="US">Amazon US</option>
            <option value="UK">Amazon UK</option>
            <option value="CA">Amazon CA</option>
            <option value="DE">Amazon DE</option>
        </select>
    </div>

    <button onclick="checkInventory()">Check Inventory</button>

    <div id="alertBox" class="alert-box"></div>

    <div class="result" id="result">

        <div class="card">
            <h3>Stock Status</h3>
            <p id="status"></p>
        </div>

        <div class="card">
            <h3>Marketplace</h3>
            <p id="market"></p>
        </div>

        <div class="card">
            <h3>Last Checked</h3>
            <p id="checked"></p>
        </div>

        <div class="history">
            <h3>Stock History</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyTable"></tbody>
            </table>
        </div>

    </div>

</div>

</div>

<script>

// Demo stock history storage
let stockHistory = JSON.parse(localStorage.getItem("stockHistory")) || [];

function checkInventory(){

    const asin = document.getElementById("asin").value.trim();
    const marketplace = document.getElementById("marketplace").value;

    if(!asin){
        alert("Please enter an ASIN.");
        return;
    }

    // Demo Random Status
    const stockAvailable = Math.random() > 0.4;

    const statusText = stockAvailable
        ? "✅ In Stock"
        : "❌ Out of Stock";

    document.getElementById("status").innerHTML =
        stockAvailable
        ? `<span class="in-stock">${statusText}</span>`
        : `<span class="out-stock">${statusText}</span>`;

    document.getElementById("market").textContent = marketplace;

    const currentTime = new Date().toLocaleString();

    document.getElementById("checked").textContent = currentTime;

    // Save History
    stockHistory.unshift({
        date: currentTime,
        status: statusText
    });

    stockHistory = stockHistory.slice(0,10);

    localStorage.setItem(
        "stockHistory",
        JSON.stringify(stockHistory)
    );

    renderHistory();

    // Out Of Stock Alert
    const alertBox = document.getElementById("alertBox");

    if(!stockAvailable){
        alertBox.style.display = "block";
        alertBox.className =
            "alert-box alert-danger";
        alertBox.innerHTML =
            "⚠ Product is currently OUT OF STOCK.";
    }else{
        alertBox.style.display = "block";
        alertBox.className =
            "alert-box alert-success";
        alertBox.innerHTML =
            "✅ Product is available in stock.";
    }

    document.getElementById("result").style.display="block";
}

function renderHistory(){

    const table = document.getElementById("historyTable");

    table.innerHTML = "";

    stockHistory.forEach(item => {

        table.innerHTML += `
        <tr>
            <td>${item.date}</td>
            <td>${item.status}</td>
        </tr>
        `;

    });
}

renderHistory();

</script>

</body>
</html>
