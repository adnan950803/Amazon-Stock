<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width,initial-scale=1.0">  <title>Image Converter Tool</title>  <style>    :root {      --primary: #229af3;      --white: #fff;      --background: #f6fafd;    }    body {      margin: 0;      font-family: 'Segoe UI', Arial, sans-serif;      background: var(--background);      color: #222;    }    .container {      max-width: 400px;      margin: 2rem auto;      background: var(--white);      border-radius: 16px;      box-shadow: 0 4px 16px rgba(34,154,243,0.07);      padding: 2rem 1.5rem 2rem 1.5rem;    }    h1 {      color: var(--primary);      text-align: center;      margin-bottom: 1.5rem;    }    .uploader {      border: 2px dashed var(--primary);      border-radius: 12px;      background: #eaf4fc;      padding: 2rem 0;      display: flex;      align-items: center;      justify-content: center;      cursor: pointer;      margin-bottom: 1rem;      transition: border 0.2s;    }    .uploader.dragover {      border: 2px solid var(--primary);      background: #d6eafd;    }    .uploader input[type="file"] {      display: none;    }    #uploadLabel {      cursor: pointer;      color: var(--primary);      font-weight: bold;      font-size: 1rem;    }    .preview {      text-align: center;      margin: 1rem 0;    }    .preview img {      max-width: 100%;      max-height: 240px;      border-radius: 8px;      box-shadow: 0 2px 8px rgba(34,154,243,0.12);    }    .controls {      display: flex;      flex-direction: column;      gap: 0.75rem;      align-items: stretch;    }    .controls label {      font-size: 0.95rem;      font-weight: 500;    }    #formatSelect, #qualityRange {      width: 100%;      padding: 0.4rem;      border-radius: 8px;      border: 1px solid #c6e6fa;    }    #convertBtn {      background: var(--primary);      color: var(--white);      font-weight: bold;      border: none;      border-radius: 8px;      padding: 0.8rem 0;      font-size: 1rem;      cursor: pointer;      margin-top: 0.5rem;      transition: background 0.2s;    }    #convertBtn:hover {      background: #1a7fc1;    }    #qualityValue {      text-align: right;      font-size: 0.93rem;      color: var(--primary);    }    .message {      margin-top: 1rem;      text-align: center;      color: #e74c3c;      font-weight: 500;    }    @media (max-width: 500px) {      .container {        padding: 1rem 0.3rem 1.5rem 0.3rem;      }      .controls {        font-size: 0.97rem;      }    }  </style></head><body>  <div class="container">    <h1>Image Converter</h1>    <div class="uploader" id="uploader">      <input type="file" id="imageInput" accept="image/*">      <label for="imageInput" id="uploadLabel">        <span>Click or Drag & Drop to Upload</span>      </label>    </div>    <div class="preview" id="previewSection" style="display:none;">      <img id="previewImage" alt="Preview">    </div>    <div class="controls" id="controls" style="display:none;">      <label for="formatSelect">Convert to:</label>      <select id="formatSelect">        <option value="image/jpeg">JPG</option>        <option value="image/png">PNG</option>        <option value="image/webp">WebP</option>      </select>      <label for="qualityRange">Quality:</label>      <input type="range" id="qualityRange" min="0.1" max="1" value="0.8" step="0.05">      <span id="qualityValue">80%</span>      <button id="convertBtn">Convert & Download</button>    </div>    <div class="message" id="message"></div>  </div>  <script>    const imageInput = document.getElementById('imageInput');    const previewSection = document.getElementById('previewSection');    const previewImage = document.getElementById('previewImage');    const controls = document.getElementById('controls');    const formatSelect = document.getElementById('formatSelect');    const qualityRange = document.getElementById('qualityRange');    const qualityValue = document.getElementById('qualityValue');    const convertBtn = document.getElementById('convertBtn');    const message = document.getElementById('message');    const uploader = document.getElementById('uploader');    let originalImage = null;
    // Drag & Drop upload    uploader.addEventListener('dragover', (e) => {      e.preventDefault();      uploader.classList.add('dragover');    });    uploader.addEventListener('dragleave', (e) => {      e.preventDefault();      uploader.classList.remove('dragover');    });    uploader.addEventListener('drop', (e) => {      e.preventDefault();      uploader.classList.remove('dragover');      if (e.dataTransfer.files && e.dataTransfer.files[0]) {        imageInput.files = e.dataTransfer.files;        handleImageUpload(e.dataTransfer.files[0]);      }    });
    imageInput.addEventListener('change', (e) => {      if (e.target.files && e.target.files[0]) {        handleImageUpload(e.target.files[0]);      }    });
    function handleImageUpload(file) {      if (!file.type.startsWith('image/')) {        message.textContent = 'Please upload a valid image file.';        previewSection.style.display = 'none';        controls.style.display = 'none';        return;      }      message.textContent = '';      const reader = new FileReader();      reader.onload = function(e) {        previewImage.src = e.target.result;        previewSection.style.display = 'block';        controls.style.display = 'flex';        originalImage = new Image();        originalImage.src = e.target.result;      };      reader.readAsDataURL(file);    }
    // Update quality label    qualityRange.addEventListener('input', function() {      qualityValue.textContent = Math.round(qualityRange.value * 100) + '%';    });
    convertBtn.addEventListener('click', function() {      if (!originalImage) return;      convertAndDownload();    });
    function convertAndDownload() {      const canvas = document.createElement('canvas');      canvas.width = originalImage.naturalWidth;      canvas.height = originalImage.naturalHeight;      const ctx = canvas.getContext('2d');      ctx.drawImage(originalImage, 0, 0);
      let format = formatSelect.value;      let quality = parseFloat(qualityRange.value);      let ext = '';      if (format === 'image/jpeg') ext = 'jpg';      else if (format === 'image/png') ext = 'png';      else if (format === 'image/webp') ext = 'webp';      else ext = 'img';
      canvas.toBlob(function(blob) {        if (blob) {          const url = URL.createObjectURL(blob);          const a = document.createElement('a');          a.href = url;          a.download = `converted-image.${ext}`;          document.body.appendChild(a);          a.click();          a.remove();          URL.revokeObjectURL(url);          message.textContent = 'Image converted and downloaded!';          message.style.color = '#229af3';          setTimeout(() => message.textContent = '', 2000);        } else {          message.textContent = 'Conversion failed. Try a different image or format.';          message.style.color = '#e74c3c';        }      }, format, quality);    }  </script></body></html>
