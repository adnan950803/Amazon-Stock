<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Sales Estimator Tool</title>

<style>
:root{
    --blue:#007BFF;
    --bg:#f4f9ff;
    --card:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:var(--bg);
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:20px;
}

header h1{
    color:var(--blue);
    font-size:2rem;
}

header p{
    color:#666;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

input, select{
    width:100%;
    padding:12px;
    border:2px solid #dbeafe;
    border-radius:10px;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    background:var(--blue);
    color:white;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0056d2;
}

.results{
    margin-top:20px;
    display:none;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.result-card{
    background:#f7fbff;
    border-left:5px solid var(--blue);
    padding:15px;
    border-radius:10px;
}

.result-card h3{
    font-size:14px;
    color:#555;
}

.result-card p{
    font-size:20px;
    font-weight:bold;
    margin-top:5px;
    color:#222;
}

.badge{
    display:inline-block;
    padding:6px 10px;
    background:var(--blue);
    color:#fff;
    border-radius:8px;
    margin-top:5px;
    font-size:12px;
}

@media(max-width:768px){
    header h1{font-size:1.5rem;}
}
</style>
</head>
<body>

<div class="container">

<header>
<h1>Amazon Sales Estimator</h1>
<p>Estimate monthly sales, revenue & category performance</p>
</header>

<div class="card">

<div class="grid">

<select id="category">
<option value="electronics">Electronics</option>
<option value="home">Home & Kitchen</option>
<option value="beauty">Beauty & Personal Care</option>
<option value="sports">Sports & Outdoors</option>
<option value="toys">Toys & Games</option>
<option value="fashion">Fashion</option>
</select>

<input type="number" id="price" placeholder="Product Price ($)">

</div>

<button onclick="estimateSales()">Estimate Sales</button>

<div class="results" id="results">

<div class="cards">

<div class="result-card">
<h3>Monthly Sales</h3>
<p id="monthlySales"></p>
</div>

<div class="result-card">
<h3>Monthly Revenue</h3>
<p id="monthlyRevenue"></p>
</div>

<div class="result-card">
<h3>Annual Revenue</h3>
<p id="annualRevenue"></p>
</div>

<div class="result-card">
<h3>Category Demand</h3>
<p id="categoryDemand"></p>
<span class="badge" id="badge"></span>
</div>

</div>

</div>

</div>

</div>

<script>

function getCategoryMultiplier(cat){

const map = {
electronics: 1.2,
home: 1.0,
beauty: 1.4,
sports: 0.9,
toys: 1.5,
fashion: 1.3
};

return map[cat] || 1;
}

function estimateSales(){

const category = document.getElementById("category").value;
const price = parseFloat(document.getElementById("price").value) || 0;

if(price <= 0){
alert("Enter valid price");
return;
}

document.getElementById("results").style.display = "block";

/* Base logic simulation */
let baseSales = Math.floor(Math.random()*3000 + 500);
let multiplier = getCategoryMultiplier(category);

let monthlySales = Math.floor(baseSales * multiplier);

/* Revenue */
let monthlyRevenue = monthlySales * price;
let annualRevenue = monthlyRevenue * 12;

/* Category demand */
let demand =
multiplier > 1.3 ? "High Demand"
: multiplier > 1.0 ? "Medium Demand"
: "Low Demand";

/* Output */
document.getElementById("monthlySales").innerText =
monthlySales + " units";

document.getElementById("monthlyRevenue").innerText =
"$" + monthlyRevenue.toLocaleString();

document.getElementById("annualRevenue").innerText =
"$" + annualRevenue.toLocaleString();

document.getElementById("categoryDemand").innerText =
demand;

document.getElementById("badge").innerText =
category.toUpperCase();

}

</script>

</body>
</html>
