<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1">  <title>Amazon Inventory Checker</title>  <style>    :root {      --main-blue: #2196F3;      --light-blue: #E3F2FD;      --white: #fff;      --gray: #f7f7f7;      --danger: #ff5252;      --success: #43a047;    }    body {      background: var(--light-blue);      font-family: 'Segoe UI', Arial, sans-serif;      margin: 0;      padding: 0;    }    .container {      max-width: 480px;      margin: 2rem auto;      background: var(--white);      border-radius: 12px;      box-shadow: 0 4px 24px rgba(33,150,243,0.15);      padding: 1.5rem;    }    h2 {      color: var(--main-blue);      margin-bottom: 1rem;      text-align: center;    }    form {      display: flex;      flex-direction: column;      gap: 1rem;    }    label {      font-weight: 600;      color: var(--main-blue);    }    input, select {      padding: 0.7rem;      border: 1px solid var(--main-blue);      border-radius: 6px;      background: var(--light-blue);      font-size: 1rem;      color: #222;    }    button {      padding: 0.85rem;      background: var(--main-blue);      color: var(--white);      border: none;      border-radius: 6px;      font-weight: bold;      cursor: pointer;      font-size: 1.05rem;      transition: background 0.2s;    }    button:hover {      background: #1565C0;    }    .stock-status {      margin-top: 1.5rem;      padding: 1.1rem;      border-radius: 8px;      text-align: center;      color: var(--white);      font-size: 1.2rem;      font-weight: bold;    }    .in-stock {      background: var(--success);    }    .out-of-stock {      background: var(--danger);      animation: blink 1s linear infinite;    }    @keyframes blink {      0%, 100% { opacity: 1; }      50% { opacity: 0.7; }    }    .history {      margin-top: 2rem;    }    .history h4 {      color: var(--main-blue);      margin-bottom: 0.7rem;    }    .history-list {      list-style-type: none;      padding: 0;      margin: 0;    }    .history-list li {      background: var(--gray);      margin-bottom: 0.4rem;      padding: 0.7rem 1rem;      border-radius: 4px;      font-size: 0.98rem;      display: flex;      justify-content: space-between;      align-items: center;    }    .history-list .in-stock {      color: var(--success);      background: transparent;    }    .history-list .out-of-stock {      color: var(--danger);      background: transparent;    }    @media (max-width: 600px) {      .container {        margin: 0.5rem;        padding: 1rem;        box-shadow: 0 2px 8px rgba(33,150,243,0.1);      }      h2 {        font-size: 1.5rem;      }    }  </style></head><body>  <div class="container">    <h2>Amazon Inventory Checker</h2>    <form id="inventoryForm">      <div>        <label for="asin">Product ASIN:</label>        <input type="text" id="asin" required placeholder="e.g., B08N5WRWNW">      </div>      <div>        <label for="marketplace">Marketplace:</label>        <select id="marketplace" required>          <option value="US">United States (.com)</option>          <option value="UK">United Kingdom (.co.uk)</option>          <option value="CA">Canada (.ca)</option>          <option value="DE">Germany (.de)</option>        </select>      </div>      <button type="submit">Check Inventory</button>    </form>    <div id="result"></div>    <div class="history" id="history">      <h4>Stock History</h4>      <ul class="history-list" id="historyList"></ul>    </div>  </div>
  <script>    // Mock data for demonstration only.    // Replace this with a real API call to fetch Amazon inventory status.    function mockCheckStock(asin, marketplace) {      // Simulate random stock status      const inStock = Math.random() > 0.4;      const now = new Date().toLocaleString();      return {        asin,        marketplace,        status: inStock ? 'In Stock' : 'Out of Stock',        time: now      };    }
    function updateHistory(entry) {      const history = JSON.parse(localStorage.getItem('stockHistory') || '[]');      history.unshift(entry);      localStorage.setItem('stockHistory', JSON.stringify(history.slice(0, 10))); // Keep last 10    }
    function renderHistory() {      const historyList = document.getElementById('historyList');      const history = JSON.parse(localStorage.getItem('stockHistory') || '[]');      historyList.innerHTML = '';      history.forEach(item => {        const li = document.createElement('li');        li.innerHTML = `          <span>            <strong>${item.asin}</strong> (${item.marketplace})<br>            <small>${item.time}</small>          </span>          <span class="${item.status === 'In Stock' ? 'in-stock' : 'out-of-stock'}">${item.status}</span>        `;        historyList.appendChild(li);      });    }
    document.getElementById('inventoryForm').addEventListener('submit', function(e) {      e.preventDefault();      const asin = document.getElementById('asin').value.trim();      const marketplace = document.getElementById('marketplace').value;
      const resultDiv = document.getElementById('result');      resultDiv.innerHTML = '<div class="stock-status" style="background:var(--main-blue);">Checking...</div>';
      // Simulate async check      setTimeout(() => {        // Replace the next line with your real data fetching code!        const check = mockCheckStock(asin, marketplace);
        let statusClass = check.status === 'In Stock' ? 'in-stock' : 'out-of-stock';        let alertMsg = '';        if (check.status === 'Out of Stock') {          alertMsg = '<br><strong>Alert:</strong> This product is currently out of stock!';        }        resultDiv.innerHTML = `<div class="stock-status ${statusClass}">${check.status}${alertMsg}</div>`;        updateHistory(check);        renderHistory();      }, 900);    });
    // Load history on startup    renderHistory();  </script></body></html>
